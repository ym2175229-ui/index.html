<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Love Gift</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; background: #1a0026; color: white; font-family: sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin: 15px; }
        .hero-name { font-weight: 900; background: linear-gradient(to right, #ff69b4, #e040fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 3rem; margin: 10px 0; }
        .btn { background: #ff69b4; color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ff69b4; background: rgba(0,0,0,0.3); color: white; text-align: center; box-sizing: border-box; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .time-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 15px; }
        .time-box b { color: #ff69b4; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [auth, setAuth] = useState(false);
            const [pass, setPass] = useState("");
            const [time, setTime] = useState({ d: 0, h: 0, m: 0 });

            useEffect(() => {
                const start = new Date("2026-01-21").getTime();
                const timer = setInterval(() => {
                    const diff = new Date().getTime() - start;
                    setTime({
                        d: Math.floor(diff / 86400000),
                        h: Math.floor((diff / 3600000) % 24),
                        m: Math.floor((diff / 60000) % 60)
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            if (!auth) {
                return (
                    <div style={{height:'100vh', display:'flex', alignItems:'center', justifyContent:'center'}}>
                        <div className="glass-card" style={{maxWidth:'320px', width:'90%'}}>
                            <h1 className="hero-name">MENNA</h1>
                            <p style={{marginBottom:'20px'}}>هدية سرية ليكي 💕</p>
                            <input type="password" placeholder="الباسورد..." className="input" onChange={(e)=>setPass(e.target.value)} />
                            <button className="btn" onClick={()=>pass.toLowerCase()==='love' ? setAuth(true) : alert('الباسورد غلط!')}>افتحي الهدية</button>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{padding:'20px', textAlign:'center', paddingTop:'50px'}}>
                    <h1 className="hero-name">MENNA</h1>
                    <p>كل اللي هنا ليكي لوحدك ❤️</p>
                    <div className="glass-card">
                        <p style={{marginBottom:'10px'}}>بقالنا مع بعض:</p>
                        <div className="grid-3">
                            <div className="time-box"><b>{time.d}</b><br/>يوم</div>
                            <div className="time-box"><b>{time.h}</b><br/>ساعة</div>
                            <div className="time-box"><b>{time.m}</b><br/>دقيقة</div>
                        </div>
                    </div>
                    <div className="glass-card">
                        <p style={{lineHeight:'1.8'}}>ربنا يخليكي ليا ومايحرمنيش منك ابدا يا روح قلبي ويارب العمر كله مع بعض ❤️</p>
                    </div>
                    <footer style={{marginTop:'50px', opacity:0.5, fontSize:'0.8rem'}}>Made with ❤️ by Youssef</footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
