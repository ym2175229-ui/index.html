<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gift for Menna</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* تعريف الألوان والمتغيرات الأساسية */
        :root {
            --bg-color-1: #1a0026; /* البنفسجي الغامق جداً */
            --bg-color-2: #2d004d; /* البنفسجي الأفتح قليلاً للمتدرج */
            --card-bg: rgba(255, 255, 255, 0.08); /* تأثير الزجاج الشفاف للكروت */
            --primary-pink: #ff69b4; /* الوردي الأساسي */
            --accent-purple: #e040fb; /* البنفسجي المضيء للعداد */
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color-1);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden; /* منع التمرير الأفقي */
            position: relative;
        }

        /* 1. الخلفية المتدرجة المتحركة (زي ريبلت) */
        #bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2; /* في الخلفية خالص */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. حاوية الجزيئات الطائرة (القلوب والنجوم) */
        #particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* عشان ما تعطلش الضغط على الكروت */
            z-index: -1; /* خلف الكروت وأمام الخلفية المتحركة */
        }

        .particle {
            position: absolute;
            color: var(--primary-pink); /* لون افتراضي (الوردي) */
            opacity: 0.6;
            animation: rise linear infinite;
        }

        /* أنيميشن صعود الجزيئات ودورانها واختفائها */
        @keyframes rise {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* تصميم الكارت الزجاجي الأساسي */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px); /* تأثير الضبابية */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            width: 90%;
            max-width: 360px;
            z-index: 10;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hero-name {
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .input-style {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: 2px solid var(--primary-pink);
            background: rgba(0,0,0,0.3);
            color: var(--text-main);
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            outline: none;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-style {
            background: linear-gradient(45deg, #d81b60, var(--primary-pink));
            color: var(--text-main);
            border: none;
            padding: 16px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        /* سيكشن العداد (مستطيلات ملونة) */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 30px 0 20px;
        }

        .time-box {
            background: rgba(142, 36, 170, 0.15); /* تدرج بنفسجي هادي */
            border-radius: 20px;
            padding: 20px 5px;
            border: 1px solid rgba(142, 36, 170, 0.3);
            transition: 0.3s;
        }

        .time-box:hover {
            border-color: var(--primary-pink);
            background: rgba(142, 36, 170, 0.25);
        }

        .time-box b {
            color: var(--text-main);
            font-size: 2rem;
            display: block;
            margin-bottom: 5px;
        }

        .time-box span {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* أنيميشن القلب النابض */
        .heart-main {
            color: #d81b60;
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
            margin-top: 20px;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        /* التوقيع السفلي */
        footer {
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            padding: 20px 0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="bg-animation"></div>
    <div id="particles-container"></div>
    <div id="root"></div>

        const { useState, useEffect } = React;

                        const lastDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                        days += lastDayOfMonth;
                    }

                        years--;
                        months += 12;
                    }
